name: Build Godot Docker Image
on:
  workflow_dispatch:
    inputs:
      godot_repo:
        description: 'Godot repository URL'
        required: true
        default: https://github.com/godotengine/godot.git
        type: string
      
      godot_commit:
        description: "Godot commit/branch/tag"
        required: true
        default: 86082170822e19ebb619c7f53c8fe54a6f8d3d2a # 86082170822e19ebb619c7f53c8fe54a6f8d3d2a for 4.7.beta3
        type: string
      
      build_profile:
        description: "Build profile"
        required: true
        default: "2d_only"
        type: choice
        options:
          - 2d_only
          - full

jobs:
  prepare:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Clone Godot
        run: |
          git clone ${{ inputs.godot_repo }} godot
          cd godot
          git checkout ${{ inputs.godot_commit }}

      - name: Install correct profile
        run: |
          mv customs/${{ inputs.build_profile }}.py godot/custom.py

      - name: Upload sources
        uses: actions/upload-artifact@v4
        with:
          name: godot-source
          path: godot
          retention-days: 1

  build_templates:
    runs-on: ubuntu-latest
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux
            image: godot-linux
            scons_platform: linuxbsd
            extra_args: "accesskit=no"
            sdk_path: '${GODOT_SDK_LINUX_X86_64}/bin'
            build_editor: true
            to_replace: "godot.linuxbsd.template_release"
            replace_into: "linux_release"

          - name: windows
            image: godot-windows
            scons_platform: windows
            extra_args: "d3d12=no winrt=no accesskit=no"
            sdk_path: '${GODOT_SDK_LINUX_X86_64}/bin'
            build_editor: false
            to_replace: "godot.windows.template_release"
            replace_into: "windows_release"

          - name: web-nothreads
            image: godot-web
            scons_platform: web
            extra_args: "threads=no dlink_enabled=no"
            sdk_path: '/usr/local/emsdk/upstream/emscripten'
            build_editor: false
            to_replace: "godot.web.template_release.wasm32.nothreads"
            replace_into: "web_nothreads_release"
          
          - name: web-nothreads-dlink
            image: godot-web
            scons_platform: web
            extra_args: "threads=no dlink_enabled=yes"
            sdk_path: '/usr/local/emsdk/upstream/emscripten'
            build_editor: false
            to_replace: "godot.web.template_release.wasm32.nothreads"
            replace_into: "web_dlink_nothreads_release"

          - name: android
            image: godot-android
            scons_platform: android
            extra_args: "swappy=no generate_apk=yes"
            sdk_path: '${GODOT_SDK_LINUX_X86_64}/bin'
            build_editor: false
            to_replace: ""
            replace_into: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Download Godot
        uses: actions/download-artifact@v4
        with:
          name: godot-source
          path: godot

      - name: Cache SCons
        uses: actions/cache@v4
        with:
          path: ~/.scons_cache
          key: ${{ runner.os }}-scons-${{ matrix.name }}

      - name: Ensure SCons cache directory exists
        run: mkdir -p $HOME/.scons_cache

      - name: Build build-containers images
        run: |
          cp custom_build.sh build-containers/custom_build.sh
          cd build-containers
          chmod +x ./custom_build.sh
          ./custom_build.sh master f43 ${{ matrix.name }}

      - name: Build template
        run: |
          podman run --rm \
            -v ${{ github.workspace }}/godot:/godot \
            -v $HOME/.scons_cache:/root/.scons_cache \
            -w /godot \
            ${{ matrix.image }}:master-f43 \
            bash -c '
              if [ -f /root/emsdk/emsdk_env.sh ]; then
                source /root/emsdk/emsdk_env.sh
              else
                export PATH=${GODOT_SDK_LINUX_X86_64}/bin:$PATH
              fi
            
              chmod +x platform/android/java/gradlew 2>/dev/null || true
              scons cache_path=/root/.scons_cache platform=${{ matrix.scons_platform }} \
              target=template_release production=yes ${{ matrix.extra_args }}
            '
      
      - name: Build editor
        if: matrix.build_editor
        run: |
          rm godot/custom.py
          podman run --rm \
            -v ${{ github.workspace }}/godot:/godot \
            -v $HOME/.scons_cache:/root/.scons_cache \
            -w /godot \
            ${{ matrix.image }}:master-f43 \
            bash -c '
              export PATH=${GODOT_SDK_LINUX_X86_64}/bin:$PATH
              chmod +x platform/android/java/gradlew 2>/dev/null || true
              scons cache_path=/root/.scons_cache platform=${{ matrix.scons_platform }} target=editor production=yes ${{ matrix.extra_args }}
            '

      - name: Collect binaries
        run: |
          mkdir -p artifacts/${{ matrix.name }}
          for f in $(find godot/bin -maxdepth 1 -type f); do
            filename=$(basename "$f")
            if [ -n "${{ matrix.to_replace }}" ]; then
              newname="${filename//${{ matrix.to_replace }}/${{ matrix.replace_into }}}"
            else
              newname="$filename"
            fi
            cp "$f" "artifacts/${{ matrix.name }}/$newname"
          done

      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: artifacts/${{ matrix.name }}/*
          retention-days: 1

  combine:
    runs-on: ubuntu-latest
    needs: build_templates
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Linux binaries
        uses: actions/download-artifact@v4
        with:
          name: linux
          path: artifacts/linux

      - name: Download Windows binaries
        uses: actions/download-artifact@v4
        with:
          name: windows
          path: artifacts/windows

      - name: Download Web nothreads binaries
        uses: actions/download-artifact@v4
        with:
          name: web-nothreads
          path: artifacts/web-nothreads

      - name: Download Web nothreads dlink binaries
        uses: actions/download-artifact@v4
        with:
          name: web-nothreads-dlink
          path: artifacts/web-nothreads-dlink

      - name: Download Android binaries
        uses: actions/download-artifact@v4
        with:
          name: android
          path: artifacts/android

      - name: Prepare final image files
        run: |
          mkdir -p final/templates
          mv artifacts/linux/*editor* final/godot.x86_64 || true
          mv artifacts/linux/*        final/templates/ || true
          mv artifacts/windows/*      final/templates/ || true
          mv artifacts/web*/*         final/templates/ || true
          mv artifacts/android/*      final/templates/ || true

      - name: Set lowercase owner
        run: echo "OWNER=$(echo ${{ github.repository_owner }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | podman login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build final image
        run: |
          chmod +x final/godot.x86_64
          SHORT_COMMIT=$(echo ${{ inputs.godot_commit }} | cut -c1-7)
          NAME=${SHORT_COMMIT}-${{ inputs.build_profile }}
          GODOT_VERSION=$(./final/godot.x86_64 --version | sed 's/\.custom_build//')

          podman build \
            --build-arg GODOT_VERSION=${GODOT_VERSION} \
            -t ghcr.io/${{ env.OWNER }}/godot-builder:${NAME} \
            -f Dockerfile.final \
            final

      - name: Push image
        run: |
          SHORT_COMMIT=$(echo ${{ inputs.godot_commit }} | cut -c1-7)
          NAME=${SHORT_COMMIT}-${{ inputs.build_profile }}
          podman push ghcr.io/${{ env.OWNER }}/godot-builder:${NAME}
